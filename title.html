<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rockimals — Title Screen</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#070d1a;color:#eaf1fb;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 40px;}
  .head{text-align:center;margin-bottom:20px;}
  .head h1{font-size:20px;font-weight:800;}
  .head p{color:#93a8ca;font-size:13px;margin-top:5px;}

  .phone{position:relative;width:380px;height:780px;border:12px solid #16233c;border-radius:46px;overflow:hidden;box-shadow:0 28px 76px rgba(0,0,0,.6);}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:140px;height:26px;background:#16233c;border-radius:0 0 16px 16px;z-index:20;}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:66px 26px 36px;text-align:center;overflow:hidden;
    background:radial-gradient(120% 70% at 50% 8%, #5a3a1e 0%, #24284f 30%, #0e1b3a 60%, #070f24 100%);}

  .stars{position:absolute;inset:0;z-index:0;pointer-events:none;background-image:
     radial-gradient(1.5px 1.5px at 15% 14%,#fff,transparent),
     radial-gradient(1.5px 1.5px at 74% 10%,#ffe6c0,transparent),
     radial-gradient(1.3px 1.3px at 40% 24%,#fff,transparent),
     radial-gradient(1.6px 1.6px at 86% 34%,#fff,transparent),
     radial-gradient(1.2px 1.2px at 25% 44%,#dfeaff,transparent),
     radial-gradient(1.4px 1.4px at 62% 50%,#fff,transparent),
     radial-gradient(1.3px 1.3px at 84% 66%,#fff,transparent),
     radial-gradient(1.2px 1.2px at 12% 72%,#ffe6c0,transparent),
     radial-gradient(1.5px 1.5px at 50% 86%,#fff,transparent),
     radial-gradient(1.3px 1.3px at 90% 90%,#fff,transparent);opacity:.85;animation:tw 3s ease-in-out infinite alternate;}
  @keyframes tw{from{opacity:.55}to{opacity:.95}}

  .ring{position:absolute;border:1px dashed rgba(255,175,110,.16);border-radius:50%;z-index:1;}
  .planet{position:absolute;border-radius:50%;z-index:1;}
  .friend{position:absolute;z-index:2;font-size:20px;opacity:.9;}

  .top{position:relative;z-index:3;}
  .w2{font-size:46px;font-weight:900;letter-spacing:2px;color:#fff;text-shadow:0 3px 0 rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;}
  .w2 .oo{display:inline-block;width:42px;height:42px;border-radius:50%;margin:0 2px;position:relative;top:2px;
    background:radial-gradient(circle at 34% 30%,#ffd9a8,#e8571f 55%,#8f3a12);box-shadow:0 0 18px rgba(232,87,31,.7);}
  .sub{font-size:12px;letter-spacing:5px;color:#ff9f43;font-weight:800;margin-top:8px;}

  .mid{position:relative;z-index:3;display:flex;flex-direction:column;align-items:center;gap:12px;}
  .float{animation:fl 3.6s ease-in-out infinite;}
  @keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-13px)}}
  .tagline{font-size:16px;font-weight:700;line-height:1.4;max-width:240px;color:#ffe4cc;}

  .bot{position:relative;z-index:3;width:100%;display:flex;flex-direction:column;align-items:center;gap:11px;}
  .playbtn{border:none;cursor:pointer;font-weight:900;letter-spacing:.5px;padding:16px 46px;border-radius:32px;font-size:19px;
    background:linear-gradient(180deg,#ffa25a,#E8571F);color:#2a0f03;box-shadow:0 12px 28px rgba(232,87,31,.45);}
  .tapline{font-size:11px;color:#c7a98d;}
  .nasa{font-size:11px;color:#9db2d3;}
</style>
</head>
<body>
<div class="head">
  <h1>Rockimals — title screen</h1>
  <p>Meet Rusty the fox — a warm, playful rock-animal mascot.</p>
</div>

<div class="phone"><div class="notch"></div>
  <div class="screen">
    <div class="stars"></div>
    <div class="ring" style="width:250px;height:250px;top:150px;left:50%;margin-left:-125px"></div>
    <div class="ring" style="width:350px;height:350px;top:100px;left:50%;margin-left:-175px"></div>
    <div class="planet" style="width:26px;height:26px;top:130px;right:30px;background:radial-gradient(circle at 34% 30%,#f0a878,#d1440e)"></div>
    <div class="planet" style="width:46px;height:46px;bottom:150px;left:-16px;background:radial-gradient(circle at 34% 30%,#f4e6c4,#c9a25a)"></div>
    <span class="friend" style="top:180px;left:38px">🐰</span>
    <span class="friend" style="top:330px;right:32px">🐘</span>

    <div class="top">
      <div class="w2">R<span class="oo"></span>CKIMALS</div>
      <div class="sub">SPACE · ANIMALS</div>
    </div>

    <div class="mid">
      <div class="float">
        <!-- ===== Rusty the fox rock-animal ===== -->
        <svg width="212" height="206" viewBox="0 0 212 206">
          <defs>
            <radialGradient id="fox" cx="38%" cy="28%">
              <stop offset="0%" stop-color="#ffc99b"/><stop offset="48%" stop-color="#ef6a2a"/><stop offset="100%" stop-color="#b83f12"/>
            </radialGradient>
            <radialGradient id="glow" cx="50%" cy="50%">
              <stop offset="0%" stop-color="rgba(255,150,70,.45)"/><stop offset="100%" stop-color="rgba(255,150,70,0)"/>
            </radialGradient>
          </defs>
          <!-- warm glow -->
          <circle cx="106" cy="108" r="100" fill="url(#glow)"/>
          <!-- bushy tail -->
          <path d="M150 158 C198 150 206 100 176 82 C192 116 168 146 138 144 Z" fill="url(#fox)"/>
          <ellipse cx="186" cy="88" rx="16" ry="14" fill="#fff2e2"/>
          <!-- feet -->
          <ellipse cx="86" cy="182" rx="15" ry="9" fill="#c24a18"/>
          <ellipse cx="126" cy="182" rx="15" ry="9" fill="#c24a18"/>
          <!-- ears (outer) -->
          <path d="M66 68 L52 18 Q70 30 92 54 Z" fill="url(#fox)"/>
          <path d="M146 68 L160 18 Q142 30 120 54 Z" fill="url(#fox)"/>
          <!-- ear tips (dark) -->
          <path d="M60 50 L53 24 Q63 32 76 46 Z" fill="#7a2a0a"/>
          <path d="M152 50 L159 24 Q149 32 136 46 Z" fill="#7a2a0a"/>
          <!-- inner ear -->
          <path d="M69 60 L60 34 Q69 40 81 54 Z" fill="#ffc4ad" opacity=".85"/>
          <path d="M143 60 L152 34 Q143 40 131 54 Z" fill="#ffc4ad" opacity=".85"/>
          <!-- rock body -->
          <path d="M106 48 C142 46 168 72 166 106 C165 140 142 164 106 164 C70 164 48 140 48 106 C48 72 70 50 106 48 Z" fill="url(#fox)"/>
          <!-- craters (keeps the 'rock' feel) -->
          <ellipse cx="70" cy="86" rx="8" ry="6" fill="#000" opacity=".1"/>
          <ellipse cx="150" cy="120" rx="7" ry="5" fill="#000" opacity=".1"/>
          <ellipse cx="60" cy="128" rx="6" ry="4" fill="#000" opacity=".1"/>
          <!-- white fox muzzle / cheeks -->
          <path d="M106 156 C84 156 72 142 72 120 C72 106 82 98 95 99 C99 103 113 103 117 99 C130 98 140 106 140 120 C140 142 128 156 106 156 Z" fill="#fff2e2"/>
          <!-- rosy cheeks -->
          <circle cx="80" cy="130" r="7.5" fill="#ff8f6b" opacity=".65"/>
          <circle cx="132" cy="130" r="7.5" fill="#ff8f6b" opacity=".65"/>
          <!-- eyes -->
          <circle cx="88" cy="98" r="13" fill="#fff"/><circle cx="124" cy="98" r="13" fill="#fff"/>
          <circle cx="91" cy="101" r="7" fill="#2a1a12"/><circle cx="121" cy="101" r="7" fill="#2a1a12"/>
          <circle cx="94" cy="98" r="2.5" fill="#fff"/><circle cx="124" cy="98" r="2.5" fill="#fff"/>
          <!-- nose + smile -->
          <path d="M99 118 Q106 126 113 118 Q106 124 99 118 Z" fill="#2a1a12"/>
          <path d="M106 124 L106 130" stroke="#2a1a12" stroke-width="2.4" stroke-linecap="round"/>
          <path d="M96 132 Q106 140 116 132" stroke="#2a1a12" stroke-width="2.8" fill="none" stroke-linecap="round"/>
          <!-- sparkle -->
          <text x="40" y="60" font-size="16">✨</text>
        </svg>
      </div>
      <div class="tagline">Meet your fuzzy little space-rock friends! 🦊</div>
    </div>

    <div class="bot">
      <button class="playbtn">▶ Play</button>
      <div class="tapline">tap anywhere to start</div>
      <div class="nasa">🚀 powered by real NASA space data</div>
    </div>
  </div>
</div>
</body>
</html>
